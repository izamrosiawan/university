<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>macOS Calendar Widget</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
            background: transparent;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .widget {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border-radius: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            width: 100%;
            aspect-ratio: 16 / 9;
            max-width: 800px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            display: flex;
            flex-direction: column;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .calendar-header h2 {
            font-size: 28px;
            font-weight: 600;
            color: #000;
            letter-spacing: -0.5px;
        }

        .calendar-nav {
            display: flex;
            gap: 8px;
        }

        .nav-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: rgba(0, 0, 0, 0.05);
            cursor: pointer;
            font-size: 14px;
            color: #666;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: rgba(0, 0, 0, 0.1);
            color: #333;
        }

        .nav-btn:active {
            transform: scale(0.95);
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .weekday {
            text-align: center;
            font-size: 14px;
            font-weight: 600;
            color: #999;
            text-transform: uppercase;
            padding: 8px 0;
            letter-spacing: 0.5px;
        }

        .days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 12px;
            flex: 1;
        }

        .day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 500;
            color: #333;
            cursor: pointer;
            transition: all 0.2s ease;
            background: transparent;
            border: none;
            position: relative;
        }

        .day:not(.empty):not(.other-month):hover {
            background: rgba(0, 0, 0, 0.08);
        }

        .day.other-month {
            color: #ccc;
        }

        .day.today {
            background: #FF9500;
            color: white;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 149, 0, 0.3);
        }

        .day.today:hover {
            background: #FF9500;
            box-shadow: 0 4px 16px rgba(255, 149, 0, 0.4);
        }

        .day.selected {
            background: rgba(0, 0, 0, 0.15);
        }

        .info-section {
            margin-top: 24px;
            padding-top: 20px;
            border-top: 1px solid rgba(0, 0, 0, 0.08);
            text-align: center;
        }

        .today-info {
            font-size: 13px;
            color: #999;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .today-date {
            font-size: 24px;
            font-weight: 600;
            color: #000;
        }


    </style>
</head>
<body>
    <div class="widget">
        <!-- Header -->
        <div class="calendar-header">
            <h2 id="monthYear">Januari 2026</h2>
            <div class="calendar-nav">
                <button class="nav-btn" id="prevBtn">‹</button>
                <button class="nav-btn" id="nextBtn">›</button>
            </div>
        </div>

        <!-- Weekdays -->
        <div class="weekdays">
            <div class="weekday">Min</div>
            <div class="weekday">Sen</div>
            <div class="weekday">Sel</div>
            <div class="weekday">Rab</div>
            <div class="weekday">Kam</div>
            <div class="weekday">Jum</div>
            <div class="weekday">Sab</div>
        </div>

        <!-- Days -->
        <div class="days" id="daysContainer"></div>

        <!-- Info Section -->
        <div class="info-section">
            <div class="today-info">Hari ini</div>
            <div class="today-date" id="todayDate">11 Maret 2026</div>
        </div>
    </div>

    <script>
        let currentDate = new Date();
        const monthYear = document.getElementById('monthYear');
        const daysContainer = document.getElementById('daysContainer');
        const todayDate = document.getElementById('todayDate');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni',
                          'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
        
        const dayNames = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const today = new Date(2026, 2, 11); // Fixed today date

            // Update header
            monthYear.textContent = `${monthNames[month]} ${year}`;

            // Get first day of month and number of days
            const firstDay = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            daysContainer.innerHTML = '';

            // Previous month days
            for (let i = firstDay - 1; i >= 0; i--) {
                const day = document.createElement('button');
                day.className = 'day empty other-month';
                day.textContent = daysInPrevMonth - i;
                daysContainer.appendChild(day);
            }

            // Current month days
            for (let i = 1; i <= daysInMonth; i++) {
                const day = document.createElement('button');
                day.className = 'day';
                day.textContent = i;

                const currentDay = new Date(year, month, i);
                if (currentDay.toDateString() === today.toDateString()) {
                    day.classList.add('today');
                }

                day.addEventListener('click', () => selectDate(i, month, year));
                daysContainer.appendChild(day);
            }

            // Next month days
            const totalCells = daysContainer.children.length;
            const remainingCells = 42 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                const day = document.createElement('button');
                day.className = 'day other-month';
                day.textContent = i;
                daysContainer.appendChild(day);
            }

            updateTodayInfo();
        }

        function selectDate(day, month, year) {
            const selectedDate = new Date(year, month, day);
            todayDate.textContent = `${day} ${monthNames[month]} ${year}`;
        }

        function updateTodayInfo() {
            const today = new Date();
            todayDate.textContent = `${today.getDate()} ${monthNames[today.getMonth()]} ${today.getFullYear()}`;
        }

        function getWeekNumber(date) {
            const firstDayOfYear = new Date(date.getFullYear(), 0, 1);
            const pastDaysOfYear = (date - firstDayOfYear) / 86400000;
            return Math.ceil((pastDaysOfYear + firstDayOfYear.getDay() + 1) / 7);
        }

        prevBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            renderCalendar();
        });

        nextBtn.addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            renderCalendar();
        });

        // Initial render
        renderCalendar();
    </script>
</body>
</html>
